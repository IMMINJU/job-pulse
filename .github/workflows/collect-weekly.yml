name: collect-weekly

on:
  schedule:
    - cron: "0 2 * * 1"   # mon 02:00 UTC (adzuna + jsearch)
    - cron: "0 2 * * 4"   # thu 02:00 UTC (adzuna only)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
      ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
      RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
      FAILURE_WEBHOOK_URL: ${{ secrets.FAILURE_WEBHOOK_URL }}
      GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: pick sources by day
        id: pick
        run: |
          dow=$(date -u +%u)   # 1=Mon .. 7=Sun
          if [ "$dow" = "1" ]; then echo "sources=adzuna,jsearch" >> "$GITHUB_OUTPUT"; fi
          if [ "$dow" = "4" ]; then echo "sources=adzuna" >> "$GITHUB_OUTPUT"; fi
      - run: npm run collect -- --sources ${{ steps.pick.outputs.sources }}
        if: steps.pick.outputs.sources != ''
